server {
	listen 80;
	server_name meghribe.42.fr;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name meghribe.42.fr;
	ssl_certificate /etc/ssl/meghribe.42.fr.crt;
	ssl_certificate_key /etc/ssl/meghribe.42.fr.crt.key;

	ssl_protocols TLSv1.2 TLSv1.3;
}

server {
	listen 443 ssl;
	server_name meghribe.42.fr;
	client_max_body_size 5m;
}

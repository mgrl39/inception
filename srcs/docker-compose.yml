# https://betterstack.com/community/guides/scaling-docker/docker-compose-getting-started/
services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    ports:
      - "9000:9000"
    networks:
      - inception

  mariadb:
    build: ./requirements/mariadb
    ports:
      - "3306:3306"
    networks:
      - inception



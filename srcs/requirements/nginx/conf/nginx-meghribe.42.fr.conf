server {
	listen 80;
	server_name meghribe.42.fr;
	# Redirect all traffic to HTTPS
	return 301 https://$host$request_uri;
}

# https://medium.com/@charanv369/enable-ssl-in-nginx-server-to-access-the-application-on-https-port-443-1bcd52667b08
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name meghribe.42.fr;
	http2 on;
	ssl_certificate /etc/ssl/openssl-meghribe.42.fr.crt;
	ssl_certificate_key /etc/ssl/openssl-meghribe.42.fr.crt.key;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
}
